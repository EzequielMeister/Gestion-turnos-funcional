<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Turnos - Centro Médico Salud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --success: #198754;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #0dcaf0;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary) 0%, #0b5ed7 100%) !important;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }
        
        .main-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, #0b5ed7 100%);
            padding: 1.5rem;
            border: none;
        }
        
        .card-body {
            padding: 0;
        }
        
        .user-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }
        
        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
        
        .stats-card:hover {
            transform: translateY(-5px);
        }
        
        .stats-card .number {
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .stats-card .label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .estado-badge {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .estado-PENDIENTE { background: #fff3cd; color: #856404; }
        .estado-CONFIRMADO { background: #d4edda; color: #155724; }
        .estado-COMPLETADO { background: #cfe2ff; color: #084298; }
        .estado-CANCELADO { background: #f8d7da; color: #721c24; }
        
        .turno-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin: 1rem;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            border-left: 5px solid var(--primary);
            transition: all 0.3s ease;
        }
        
        .turno-card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transform: translateX(5px);
        }
        
        .turno-fecha {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .turno-hora {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }
        
        .btn-cancelar {
            border-radius: 50px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .nav-pills .nav-link {
            border-radius: 50px;
            padding: 0.5rem 1rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="text-center text-white">
        <div class="loading-spinner mb-3"></div>
        <p>Cargando...</p>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <i class="bi bi-heart-pulse me-2"></i>
            <span>Centro Médico Salud</span>
        </a>
        <div class="d-flex align-items-center">
            <div class="user-info d-flex align-items-center me-3">
                <i class="bi bi-person-circle me-2"></i>
                <span id="usuarioLogueado">Cargando...</span>
            </div>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right me-1"></i>Salir
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="main-card">
                <div class="card-header text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="bi bi-calendar-check me-2"></i>Mis Turnos</h4>
                    <ul class="nav nav-pills">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="sacar-turnos.html">
                                <i class="bi bi-plus-circle me-1"></i>Nuevo Turno
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white active" href="lista-turnos.html">
                                <i class="bi bi-list-ul me-1"></i>Ver Turnos
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="card-body">
                    <div class="row g-3 mb-4" id="statsRow" style="display: none;">
                        <div class="col-md-3">
                            <div class="stats-card">
                                <div class="number text-primary" id="statTotal">0</div>
                                <div class="label">Total</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stats-card">
                                <div class="number text-warning" id="statPendientes">0</div>
                                <div class="label">Pendientes</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stats-card">
                                <div class="number text-success" id="statConfirmados">0</div>
                                <div class="label">Confirmados</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stats-card">
                                <div class="number text-info" id="statCompletados">0</div>
                                <div class="label">Completados</div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="turnosContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let usuarioLogueado = '';
    let esAdmin = false;
    let todosLosTurnos = [];
    
    async function obtenerUsuario() {
        try {
            const res = await fetch('/api/me', { credentials: 'include' });
            if (res.ok) {
                const data = await res.json();
                usuarioLogueado = data.username;
                esAdmin = data.rol === 'admin';
                document.getElementById('usuarioLogueado').textContent = usuarioLogueado;
                cargarTurnos();
            } else {
                window.location.href = 'login.html';
            }
        } catch (error) {
            console.error('Error:', error);
            window.location.href = 'login.html';
        }
    }

    async function cargarTurnos() {
        try {
            const res = await fetch('/api/turnos?page=0&size=100', { credentials: 'include' });
            if (!res.ok) throw new Error('Error al obtener turnos');
            
            const result = await res.json();
            if (result.success && result.data) {
                todosLosTurnos = result.data.content || result.data;
                mostrarEstadisticas(todosLosTurnos);
                mostrarTurnos(todosLosTurnos);
            } else if (Array.isArray(result)) {
                todosLosTurnos = result;
                mostrarEstadisticas(todosLosTurnos);
                mostrarTurnos(todosLosTurnos);
            }
        } catch (error) {
            console.error('Error al cargar turnos:', error);
            document.getElementById('turnosContainer').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Error al cargar los turnos</p></div>';
        }
    }

    function mostrarEstadisticas(turnos) {
        document.getElementById('statsRow').style.display = 'flex';
        document.getElementById('statTotal').textContent = turnos.length;
        document.getElementById('statPendientes').textContent = turnos.filter(t => t.estado === 'PENDIENTE').length;
        document.getElementById('statConfirmados').textContent = turnos.filter(t => t.estado === 'CONFIRMADO').length;
        document.getElementById('statCompletados').textContent = turnos.filter(t => t.estado === 'COMPLETADO').length;
    }

    function mostrarTurnos(turnos) {
        const container = document.getElementById('turnosContainer');
        
        if (turnos.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="bi bi-calendar-x"></i><h5>No hay turnos registrados</h5><p>Solicite un nuevo turno para comenzar</p><a href="sacar-turnos.html" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Agendar Turno</a></div>';
            return;
        }

        const turnosOrdenados = [...turnos].sort((a, b) => new Date(b.fechaHora) - new Date(a.fechaHora));
        
        container.innerHTML = '<div class="row">' + turnosOrdenados.map(turno => crearTurnoCard(turno)).join('') + '</div>';
    }

    function crearTurnoCard(turno) {
        const fecha = new Date(turno.fechaHora);
        const fechaFormateada = fecha.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        const horaFormateada = fecha.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        const puedeCancelar = turno.estado !== 'CANCELADO' && turno.estado !== 'COMPLETADO';
        
        return '<div class="col-md-6 col-lg-4"><div class="turno-card estado-' + turno.estado + '"><div class="d-flex justify-content-between align-items-start mb-3"><span class="estado-badge estado-' + turno.estado + '"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>' + turno.estado + '</span>' + (puedeCancelar ? '<button class="btn btn-outline-danger btn-sm btn-cancelar" onclick="cancelarTurno(' + turno.id + ')"><i class="bi bi-x-circle"></i></button>' : '') + '</div><div class="turno-fecha">' + fechaFormateada + '</div><div class="turno-hora">' + horaFormateada + '</div><hr><div class="row"><div class="col-6"><small class="text-muted">Médico</small><div><i class="bi bi-stethoscope me-1"></i>' + turno.medicoNombre + '</div></div><div class="col-6"><small class="text-muted">Especialidad</small><div><i class="bi bi-briefcase me-1"></i>' + turno.especialidadNombre + '</div></div></div></div></div>';
    }

    async function cancelarTurno(id) {
        if (!confirm('¿Está seguro que desea cancelar este turno?')) return;
        
        try {
            const res = await fetch('/api/turnos/' + id, {
                method: 'DELETE',
                credentials: 'include'
            });
            
            if (res.ok || res.status === 204) {
                alert('Turno cancelado exitosamente');
                cargarTurnos();
            } else {
                const data = await res.json();
                alert('Error: ' + (data.message || 'No se pudo cancelar el turno'));
            }
        } catch (error) {
            alert('Error de red: ' + error.message);
        }
    }

    function logout() {
        window.location.href = '/logout';
    }

    obtenerUsuario();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
