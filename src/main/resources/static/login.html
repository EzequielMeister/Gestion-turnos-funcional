<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Centro Médico Salud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0b5ed7;
            --success: #198754;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-header-custom {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 2rem;
            text-align: center;
        }
        
        .card-header-custom i {
            font-size: 3rem;
            color: white;
            margin-bottom: 0.5rem;
        }
        
        .card-header-custom h2 {
            color: white;
            margin: 0;
            font-weight: 600;
        }
        
        .card-header-custom p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0.5rem 0 0;
            font-size: 0.9rem;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .form-label {
            font-weight: 500;
            color: #495057;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(13, 110, 253, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-alert {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
            font-size: 0.85rem;
        }
        
        .footer-text a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .input-group-text {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
            border-radius: 10px 0 0 10px;
        }
        
        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="card-header-custom">
            <i class="bi bi-heart-pulse"></i>
            <h2>Centro Médico Salud</h2>
            <p>Sistema de Gestión de Turnos</p>
        </div>
        <div class="card-body">
            <div id="errorContainer"></div>
            
            <form method="post" action="/login" id="loginForm">
                <div class="mb-4">
                    <label for="username" class="form-label">
                        <i class="bi bi-person me-1"></i>Usuario
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" id="username" name="username" class="form-control" 
                               placeholder="Ingrese su usuario" required autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i>Contraseña
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="Ingrese su contraseña" required>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-login" id="btnLogin">
                        <span id="loginText">Iniciar Sesión</span>
                        <span id="loginSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
                    </button>
                </div>
            </form>
            
            <div class="footer-text">
                <p class="mb-1"><i class="bi bi-shield-check me-1"></i>Sus datos están protegidos</p>
                <small>¿Olvidó su contraseña? <a href="#">Recuperar acceso</a></small>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-4 text-white">
        <small>
            <i class="bi bi-info-circle me-1"></i>
            Credenciales de prueba: admin / adminpass
        </small>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const logout = params.get('logout');
    const denied = params.get('denied');
    
    const errorContainer = document.getElementById('errorContainer');
    
    if (error === 'true') {
        errorContainer.innerHTML = `
            <div class="error-alert">
                <div class="d-flex align-items-center">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-4 me-3"></i>
                    <div>
                        <strong>Error de autenticación</strong>
                        <p class="mb-0 text-muted">Usuario o contraseña incorrectos</p>
                    </div>
                </div>
            </div>
        `;
    }
    
    if (logout === 'true') {
        errorContainer.innerHTML = `
            <div class="alert alert-success" style="border-radius: 10px;">
                <i class="bi bi-check-circle me-2"></i>
                Sesión cerrada correctamente
            </div>
        `;
    }
    
    if (denied === 'true') {
        errorContainer.innerHTML = `
            <div class="error-alert">
                <div class="d-flex align-items-center">
                    <i class="bi bi-shield-x text-danger fs-4 me-3"></i>
                    <div>
                        <strong>Acceso denegado</strong>
                        <p class="mb-0 text-muted">No tiene permisos para acceder a este recurso</p>
                    </div>
                </div>
            </div>
        `;
    }
    
    document.getElementById('loginForm').addEventListener('submit', function() {
        const btn = document.getElementById('btnLogin');
        const text = document.getElementById('loginText');
        const spinner = document.getElementById('loginSpinner');
        
        btn.disabled = true;
        text.textContent = 'Iniciando sesión...';
        spinner.classList.remove('d-none');
    });
</script>
</body>
</html>
