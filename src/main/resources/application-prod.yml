spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:gestion_turnos};encrypt=false;trustServerCertificate=true
    username: ${DB_USER:eze}
    password: ${DB_PASS:passpass}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
    open-in-view: false

logging:
  level:
    com.ezequiel.gestion_turnos: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
